
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#281733">
    <title>
      {% block title %}{% if page.title %}{{ page.title }} | {% endif %} {{ config.title }}{% endblock %}
    </title>
    <meta name="description" content="{{ config.description }}">
    <link rel="icon" type="image/svg+xml" href="/website-cn/favicon.svg">
    <link rel="icon" type="image/png" href="/website-cn/favicon.png">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap">
    <link href="/website-cn/style.css" rel="stylesheet">
    <link href="/website-cn/asciinema-player.css" rel="stylesheet">
    {% block rss %}
      <link rel="alternate" type="application/atom+xml" title="Atom" href="{{ get_url(path="/website-cn/atom.xml", trailing_slash=false) }}">
    {% endblock %}
  </head>
  <body>
    <div class="overlay"></div>
    <nav>
        <a href="/website-cn" style="display: flex; align-items: center;">
          <img src="/website-cn/logo.svg" alt="Logo" height="64" style="padding-right: 1.25rem; margin: 0" />
          <h1>Helix</h1>
        </a>
        <div style="flex: 1"></div>
        <menu style="display: flex; flex-wrap: wrap;">
          <a href="/website-cn/news">最新动态</a>
          <a href="/helix-docs-cn">文档</a>
          <a href="https://github.com/helix-editor/helix">GitHub</a>
          <a href="https://matrix.to/#/#helix-community:matrix.org">Matrix</a>
          <a href="/helix-docs-cn/install.html">下载</a>
        </menu>
    </nav>
    <article>
        {% block content %} {% endblock %}
    </article>
</body></html>
